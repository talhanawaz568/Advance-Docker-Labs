# Default values for my-web-app
replicaCount: 2

image:
  repository: python
  pullPolicy: IfNotPresent
  tag: "3.9-slim"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Custom configuration for our Python app
app:
  name: "My Python Web App"
  message: "Hello from Helm!"
